services:
  postgres_db:
    image: postgres:18-alpine
    container_name: worklog_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: worklog_db
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d worklog_db']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - worklog_network

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: worklog_backend
    restart: always
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=${NODE_ENV}
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      postgres_db:
        condition: service_healthy
    networks:
      - worklog_network

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: worklog_frontend
    ports:
      - '3000:80'
    restart: always
    depends_on:
      - backend
    networks:
      - worklog_network

volumes:
  pgdata:

networks:
  worklog_network:
    driver: bridge
