name: Continuous Integration

run-name: CI Run by @${{ github.actor }} — 🚀 ${{ github.event.head_commit.message }}

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Code Quality (Linting)
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Clone Repository
        uses: actions/checkout@v6

      - name: 🛠️ Setup Node & Dependencies
        uses: ./.github/actions/setup-project

      - name: 🧼 Run Linter Checks
        run: npm run lint

  build-backend:
    name: Build Backend Verification
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Clone Repository
        uses: actions/checkout@v6

      - name: 🛠️ Setup Dependencies
        uses: ./.github/actions/setup-project

      - name: 🏗️ Compile Backend Application
        shell: bash
        run: |
          if [ -d backend ] && [ -f backend/package.json ]; then
            cd backend && npm run build --if-present
          else
            echo "Backend application not initialized yet, skipping build..."
          fi

  build-frontend:
    name: Build Frontend Verification
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Clone Repository
        uses: actions/checkout@v6

      - name: 🛠️ Prepare Frontend Build Tools
        uses: ./.github/actions/setup-project

      - name: 🏗️ Compile Frontend Application
        shell: bash
        run: |
          if [ -d frontend ] && [ -f frontend/package.json ]; then
            cd frontend && npm run build --if-present
          else
            echo "Frontend application not initialized yet, skipping build..."
          fi
