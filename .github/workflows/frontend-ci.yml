name: Frontend CI

on:
  pull_request:
    paths: ['frontend/**']
  push:
    branches: [main]
    paths: ['frontend/**']

jobs:
  validate:
    name: Code Quality & Type Safety
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Clone Repository
        uses: actions/checkout@v6

      - name: 🛠️ Setup Node & Dependencies
        uses: ./.github/actions/setup-project

      - name: 🛡️ Check TypeScript Types
        run: npm run typecheck:frontend

      - name: 🧼 Run Linter Checks
        run: npm run lint

  build-frontend:
    name: Build Frontend Verification
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Clone Repository
        uses: actions/checkout@v6

      - name: 🛠️ Prepare Frontend Build Tools
        uses: ./.github/actions/setup-project

      - name: 🏗️ Compile Frontend Application
        run: npm run build:frontend